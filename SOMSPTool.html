<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title>Mental Space Clock - Spread from Marker</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f5f5f5; font-size: 1rem; margin: 0; }

  /* ── Top info fields ── */
  .info-fields { background: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; max-width: 520px; width: 100%; }
  .info-row { display: grid; gap: 15px; margin-bottom: 15px; }
  .info-row.row-3cols { grid-template-columns: repeat(3,1fr); }
  .info-row.row-4cols { grid-template-columns: 1.2fr 0.95fr 0.65fr 1fr; }
  .info-fields label { font-size: 0.9rem; display: block; margin-bottom: 3px; }
  .info-fields input, .info-fields select { width: 100%; padding: 5px; font-size: 0.85rem; text-transform: uppercase; }

  /* ── Clock ── */
  #clockContainer { position: relative; margin: 10px 20px 0; width: 100%; max-width: 500px; overflow: visible; }
  #clockCanvas { border: 1px solid #333; border-radius: 50%; background-color: #f9f9f9; display: block; width: 100%; height: auto; cursor: grab; }
  #clockCanvas:active { cursor: grabbing; }
  .click-hint { background: #fff3cd; padding: 8px 12px; border-radius: 20px; text-align: center; margin: 8px 0 16px; max-width: 500px; width: 100%; }
  .marker-label { position: absolute; font-weight: bold; background: rgba(255,255,255,0.85); padding: 2px 6px; border-radius: 4px; font-size: 13px; white-space: nowrap; transform: translateX(-50%); }

  /* ── Two-column panel layout ── */
  .panels-wrapper { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 520px; align-items: flex-start; }
  .panel-column { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 0; }

  /* ── Individual panel cards ── */
  .canvas-input { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.3); width: 100%; }
  .canvas-input-title { font-weight: bold; text-align: center; margin-bottom: 8px; font-size: 0.95rem; }
  .canvas-input-group { margin-bottom: 10px; }
  .canvas-input-group label { font-size: 0.72rem; display: block; margin-bottom: 3px; }
  .canvas-input input, .canvas-input select { width: 100%; padding: 4px 5px; font-size: 0.72rem; }
  .distance-spread-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .distance-spread-row .canvas-input-group { flex: 1; margin-bottom: 0; }
  .eye-row { display: flex; gap: 6px; align-items: center; }

  /* ── Clock position: display-only ── */
  input.clock-display {
    background: #f0f0f0;
    color: #444;
    cursor: default;
    border: 1px solid #ccc;
    font-style: italic;
  }
  input.clock-display:focus { outline: none; box-shadow: none; }

  /* ── Bi-location checkbox ── */
  .bilocation-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: 10px; padding: 5px 6px;
    background: #f0f4ff; border-radius: 4px; border: 1px solid #c5d0f0;
  }
  .bilocation-row label { font-size: 0.78rem; font-weight: bold; color: #3a4a8a; cursor: pointer; margin: 0; }
  .bilocation-row input[type=checkbox] { width: auto; cursor: pointer; accent-color: #3a4a8a; }

  /* ── Notes ── */
  .notes-container {
    width: 100%; max-width: 520px; background: white; padding: 15px;
    border-radius: 5px; box-shadow: 0 0 5px rgba(0,0,0,0.1);
    margin-top: 20px; margin-bottom: 20px;
  }
  .notes-container label { font-weight: bold; display: block; margin-bottom: 8px; }
  .notes-container textarea { width: 100%; min-height: 120px; resize: vertical; font-size: 0.875rem; padding: 8px; }

  /* ── Dismissable popup ── */
  #popupOverlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center; z-index: 10000;
  }
  #popupOverlay.active { display: flex; }
  #popupBox {
    background: white; border-radius: 10px; max-width: 420px; width: 90%;
    padding: 24px 20px 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  #popupBox h3 { margin: 0 0 12px; font-size: 1rem; color: #c0392b; }
  #popupList { margin: 0 0 16px; padding-left: 18px; font-size: 0.88rem; line-height: 1.6; color: #333; }
  #popupClose {
    display: block; margin: 0 auto; padding: 7px 24px;
    background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
  }

  button { margin: 10px; padding: 8px 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
  button:disabled { background-color: #ccc; cursor: default; }

  @media (max-width: 480px) {
    .panels-wrapper { flex-direction: column; }
    .info-row.row-4cols { grid-template-columns: 1fr 1fr; }
  }
  .logo-container { text-align: center; margin-bottom: 16px; }
.logo-container img { max-width: 440px; width: 100%; height: auto; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
(function(){

  // ── Canvas ────────────────────────────────────────────────────
  const canvas = document.getElementById('clockCanvas');
  const ctx    = canvas.getContext('2d');
  const CX = 250, CY = 250, R = 200;

  // 0=Before  1=After  2=Before-BL  3=After-BL
  const COLORS = ['#FF5733','#33AA33','#0055cc','#9900cc'];
  const LABELS = ['Before','After','Before-BL','After-BL'];

  let markers    = [null,null,null,null];
  let blBeforeOn = false, blAfterOn = false;
  let isDragging = false, dragIdx = null;

  const $ = id => document.getElementById(id);

  // ── Panel field groups (indexed 0-3) ──────────────────────────
  // BL panels (2,3) have no suds field — null
  const PANEL = [
    { suds:$('startSuds'),  clock:$('startClockPos'), dist:$('startDistance'),
      spread:$('startSpread'), eyePos:$('startEyePos'), eyeLvl:$('startEyeLevel') },
    { suds:$('endSuds'),    clock:$('endClockPos'),   dist:$('endDistance'),
      spread:$('endSpread'),   eyePos:$('endEyePos'),  eyeLvl:$('endEyeLevel') },
    { suds:null, clock:$('blStartClockPos'), dist:$('blStartDistance'),
      spread:$('blStartSpread'), eyePos:$('blStartEyePos'), eyeLvl:$('blStartEyeLevel') },
    { suds:null, clock:$('blEndClockPos'),   dist:$('blEndDistance'),
      spread:$('blEndSpread'),   eyePos:$('blEndEyePos'),   eyeLvl:$('blEndEyeLevel') }
  ];

  const hoursInput  = $('hours');
  const downloadBtn = $('downloadBtn');
  const dynamicHint = $('dynamicHint');
  const notesTA     = $('notes');
  const blBeforeChk = $('blBeforeCheck');
  const blAfterChk  = $('blAfterCheck');

  // ── Popup ─────────────────────────────────────────────────────
  const popupOverlay = $('popupOverlay');
  const popupList    = $('popupList');
  $('popupClose').addEventListener('click', () => popupOverlay.classList.remove('active'));
  popupOverlay.addEventListener('click', e => { if(e.target===popupOverlay) popupOverlay.classList.remove('active'); });

  function showPopup(errors){
    popupList.innerHTML = errors.map(e => `<li>${e}</li>`).join('');
    popupOverlay.classList.add('active');
  }

  // ── Uppercase enforcement for top text inputs ─────────────────
  ['therapistNumber','participantNumber','issueName','modality','sessionDate'].forEach(id => {
    $(id).addEventListener('input', function(){ this.value = this.value.toUpperCase(); });
  });

  // ── Floating marker labels ────────────────────────────────────
  const floatLabels = LABELS.map((txt,i) => {
    const d = document.createElement('div');
    d.className = 'marker-label';
    d.style.color = COLORS[i];
    d.style.display = 'none';
    $('clockContainer').appendChild(d);
    return d;
  });

  // ── Geometry helpers ──────────────────────────────────────────
  function getAngleDeg(x,y){
    return ((Math.atan2(y-CY, x-CX) * 180/Math.PI + 360) % 360 + 90) % 360;
  }
  function angleToTime(deg){
    let mins = Math.round((deg/360)*720/5)*5;
    if(mins >= 720) mins = 0;
    let h = Math.floor(mins/60) || 12, m = mins%60;
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
  }
  function validPos(x,y,excl){
    let d = Math.hypot(x-CX, y-CY);
    if(d > R || d < 40) return false;
    for(let i=0;i<4;i++){
      if(i===excl || !markers[i]) continue;
      if(Math.hypot(x-markers[i].x, y-markers[i].y) < 15) return false;
    }
    return true;
  }
  function markerAt(cx,cy){
    const rect = canvas.getBoundingClientRect();
    const px = (cx-rect.left)*(canvas.width/rect.width);
    const py = (cy-rect.top)*(canvas.height/rect.height);
    for(let i=3;i>=0;i--){
      if(markers[i] && Math.hypot(px-markers[i].x, py-markers[i].y) <= 12) return i;
    }
    return -1;
  }

  // ── Drawing ───────────────────────────────────────────────────
  function drawWedge(mx,my,spreadDeg,color){
    if(spreadDeg <= 0) return;
    let dx=mx-CX, dy=my-CY;
    let out = Math.atan2(dy,dx);
    let half = (spreadDeg*Math.PI/180)/2;
    let len = Math.min(70, Math.max(30, (R-Math.hypot(dx,dy))*0.8));
    let steps = Math.max(8, Math.floor(spreadDeg/10));
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.moveTo(mx,my);
    for(let i=0;i<=steps;i++){
      let a = out - half + i/steps*(2*half);
      ctx.lineTo(mx+Math.cos(a)*len, my+Math.sin(a)*len);
    }
    ctx.closePath();
    ctx.fillStyle = color; ctx.fill();
    ctx.globalAlpha = 0.8; ctx.strokeStyle = color; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.restore();
  }

  function drawClock(){
    ctx.clearRect(0,0,500,500);
    ctx.beginPath(); ctx.arc(CX,CY,R,0,2*Math.PI);
    ctx.strokeStyle='#333'; ctx.lineWidth=3; ctx.stroke();
    ctx.font='bold 16px Arial'; ctx.fillStyle='#333';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(let i=1;i<=12;i++){
      let a=(i-3)*Math.PI/6;
      let x=CX+Math.cos(a)*R*0.8, y=CY+Math.sin(a)*R*0.8;
      ctx.beginPath(); ctx.arc(x,y,3,0,2*Math.PI); ctx.fill();
      ctx.fillText(i, CX+Math.cos(a)*R*0.92, CY+Math.sin(a)*R*0.92);
    }
    ctx.beginPath(); ctx.arc(CX,CY,20,0,2*Math.PI); ctx.fillStyle='magenta'; ctx.fill();
    for(let i=0;i<4;i++){
      if(!markers[i] || PANEL[i].spread.disabled) continue;
      let s = parseFloat(PANEL[i].spread.value);
      if(!isNaN(s) && s>0) drawWedge(markers[i].x, markers[i].y, s, COLORS[i]);
    }
    for(let i=0;i<4;i++){
      if(!markers[i]) continue;
      ctx.beginPath(); ctx.arc(markers[i].x, markers[i].y, 10, 0, 2*Math.PI);
      ctx.fillStyle=COLORS[i]; ctx.fill();
      ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.stroke();
    }
    updateFloats();
  }

  function updateFloats(){
    const cr = $('clockContainer').getBoundingClientRect();
    const cv = canvas.getBoundingClientRect();
    const ox=cv.left-cr.left, oy=cv.top-cr.top;
    const sx=canvas.clientWidth/canvas.width, sy=canvas.clientHeight/canvas.height;
    for(let i=0;i<4;i++){
      if(markers[i]){
        floatLabels[i].textContent = LABELS[i];
        floatLabels[i].style.left  = (ox+markers[i].x*sx)+'px';
        floatLabels[i].style.top   = (oy+markers[i].y*sy+20)+'px';
        floatLabels[i].style.display = 'block';
      } else { floatLabels[i].style.display = 'none'; }
    }
  }
  window.addEventListener('resize', updateFloats);

  // ── Validation ────────────────────────────────────────────────
  function topOK(){
    return $('therapistNumber').value.trim() &&
           $('participantNumber').value.trim() &&
           $('issueName').value.trim() &&
           $('modality').value.trim() &&
           $('sessionType').value &&
           parseFloat(hoursInput.value) > 0 &&
           $('sessionDate').value.trim();
  }

  function panelOK(idx){
    let p = PANEL[idx];
    if(!markers[idx]) return false;
    if(p.suds){ // only primary panels have SUDS
      let s = parseInt(p.suds.value);
      if(isNaN(s)||s<1||s>10) return false;
    }
    if(!p.dist.value.trim() || parseFloat(p.dist.value)<0) return false;
    let sp = parseFloat(p.spread.value);
    if(isNaN(sp)||sp<0||sp>360) return false;
    if(p.eyePos.value!=='Level' && (!p.eyeLvl.value.trim()||parseFloat(p.eyeLvl.value)<0)) return false;
    return true;
  }

  function collectErrors(){
    let errs = [];
    if(!$('therapistNumber').value.trim()) errs.push('Administrator Code is required');
    if(!$('participantNumber').value.trim()) errs.push('Participant Code is required');
    if(!$('issueName').value.trim()) errs.push('Name for Emotion is required');
    if(!$('modality').value.trim()) errs.push('Therapy Modality is required');
    if(!$('sessionType').value) errs.push('Session Type must be selected');
    let hrs = parseFloat(hoursInput.value);
    if(isNaN(hrs)||hrs<=0) errs.push('Hours Used must be a positive number');
    if(!$('sessionDate').value.trim()) errs.push('End Date is required');
    if(!markers[0]) errs.push('BEFORE marker not placed on clock');
    else if(!panelOK(0)) errs.push('BEFORE panel: check Feeling Level (1-10), Distance, Spread, and Eye Level');
    if(blBeforeOn){
      if(!markers[2]) errs.push('BEFORE-BL marker not placed on clock');
      else if(!panelOK(2)) errs.push('BEFORE-BL panel: check Distance, Spread, and Eye Level');
    }
    if(!markers[1]) errs.push('AFTER marker not placed on clock');
    else if(!panelOK(1)) errs.push('AFTER panel: check Feeling Level (1-10), Distance, Spread, and Eye Level');
    if(blAfterOn){
      if(!markers[3]) errs.push('AFTER-BL marker not placed on clock');
      else if(!panelOK(3)) errs.push('AFTER-BL panel: check Distance, Spread, and Eye Level');
    }
    return errs;
  }

  // ── Enable/disable panels ─────────────────────────────────────
  function enablePanel(idx, on){
    let p = PANEL[idx];
    if(p.suds) p.suds.disabled = !on;
    p.dist.disabled = !on; p.spread.disabled = !on;
    p.eyePos.disabled = !on;
    p.eyeLvl.disabled = !on || (p.eyePos.value==='Level');
    // clock is always readonly — value set only by clock face, never disabled
  }

  function updateFieldStates(){
    for(let i=0;i<4;i++) enablePanel(i, !!markers[i]);
    let ready = topOK() && panelOK(0) && panelOK(1);
    if(blBeforeOn) ready = ready && panelOK(2);
    if(blAfterOn)  ready = ready && panelOK(3);
    downloadBtn.disabled = !ready;
    updateHint();
  }

  // ── Placement sequence: 0 → (2 if blBefore) → 1 → (3 if blAfter) ──
  function nextSlot(){
    if(!markers[0]) return 0;
    if(blBeforeOn && !markers[2] && panelOK(0)) return 2;
    if(!markers[1]){
      if(!panelOK(0)) return null;
      if(blBeforeOn && !panelOK(2)) return null;
      return 1;
    }
    if(blAfterOn && !markers[3] && panelOK(1)) return 3;
    return null;
  }

  function placeMarker(x,y,idx){
    markers[idx] = {x, y, angleDeg: getAngleDeg(x,y)};
    PANEL[idx].clock.value = angleToTime(markers[idx].angleDeg);
    drawClock();
    updateFieldStates();
  }

  // ── Mouse handlers ────────────────────────────────────────────
  canvas.addEventListener('mousedown', function(e){
    e.preventDefault();
    let i = markerAt(e.clientX, e.clientY);
    if(i!==-1){ isDragging=true; dragIdx=i; canvas.style.cursor='grabbing'; }
  });
  window.addEventListener('mousemove', function(e){
    if(!isDragging||dragIdx===null) return;
    const rect = canvas.getBoundingClientRect();
    let nx=(e.clientX-rect.left)*(canvas.width/rect.width);
    let ny=(e.clientY-rect.top)*(canvas.height/rect.height);
    if(!validPos(nx,ny,dragIdx)) return;
    markers[dragIdx]={x:nx,y:ny,angleDeg:getAngleDeg(nx,ny)};
    PANEL[dragIdx].clock.value = angleToTime(markers[dragIdx].angleDeg);
    drawClock();
  });
  window.addEventListener('mouseup', function(){
    if(isDragging){ isDragging=false; dragIdx=null; canvas.style.cursor='grab'; updateFieldStates(); }
  });

  canvas.addEventListener('click', function(e){
    if(isDragging) return;
    if(!topOK()){
      let topErrs = collectErrors().filter(e =>
        e.includes('Administrator')||e.includes('Participant')||
        e.includes('Emotion')||e.includes('Modality')||
        e.includes('Session Type')||e.includes('Hours')||e.includes('Date')
      );
      showPopup(topErrs.length ? topErrs : ['Complete all top fields first']);
      return;
    }
    const rect = canvas.getBoundingClientRect();
    let x=(e.clientX-rect.left)*(canvas.width/rect.width);
    let y=(e.clientY-rect.top)*(canvas.height/rect.height);
    if(Math.hypot(x-CX,y-CY)>R || Math.hypot(x-CX,y-CY)<40) return;
    if(markerAt(e.clientX,e.clientY)!==-1) return;
    let slot = nextSlot();
    if(slot===null){
      let errs = collectErrors();
      if(errs.length) showPopup(errs);
      else { dynamicHint.innerText='❗ All markers already placed'; setTimeout(updateHint,2000); }
      return;
    }
    if(!validPos(x,y,slot)) return;
    placeMarker(x,y,slot);
  });

  // ── Hint ──────────────────────────────────────────────────────
  function updateHint(){
    if(!topOK()){ dynamicHint.innerText='⚠️ Complete all top fields (Hours must be positive)'; return; }
    if(!markers[0]){ dynamicHint.innerText='✅ Click clock to place BEFORE marker'; return; }
    if(!panelOK(0)){ dynamicHint.innerText='🔘 Fill BEFORE fields'; return; }
    if(blBeforeOn&&!markers[2]){ dynamicHint.innerText='✅ Click clock to place BEFORE-BL marker'; return; }
    if(blBeforeOn&&!panelOK(2)){ dynamicHint.innerText='🔘 Fill BEFORE-BL fields'; return; }
    if(!markers[1]){ dynamicHint.innerText='✅ Click clock to place AFTER marker'; return; }
    if(!panelOK(1)){ dynamicHint.innerText='📝 Fill AFTER fields'; return; }
    if(blAfterOn&&!markers[3]){ dynamicHint.innerText='✅ Click clock to place AFTER-BL marker'; return; }
    if(blAfterOn&&!panelOK(3)){ dynamicHint.innerText='📝 Fill AFTER-BL fields'; return; }
    dynamicHint.innerText='✔ Ready to download';
  }

  // ── Bi-location checkboxes ────────────────────────────────────
  function clearPanel(idx){
    let p = PANEL[idx];
    if(p.suds) p.suds.value='';
    p.dist.value=''; p.spread.value=''; p.eyeLvl.value='';
    p.eyePos.value='Level'; p.clock.value='';
    markers[idx]=null;
  }

  blBeforeChk.addEventListener('change', function(){
    blBeforeOn = this.checked;
    $('panel-before-bl').style.display = this.checked ? 'block' : 'none';
    if(!this.checked) clearPanel(2);
    drawClock(); updateFieldStates();
  });
  blAfterChk.addEventListener('change', function(){
    blAfterOn = this.checked;
    $('panel-after-bl').style.display = this.checked ? 'block' : 'none';
    if(!this.checked) clearPanel(3);
    drawClock(); updateFieldStates();
  });

  // ── Eye-level toggles ─────────────────────────────────────────
  for(let i=0;i<4;i++){
    (function(idx){
      PANEL[idx].eyePos.addEventListener('change', function(){
        PANEL[idx].eyeLvl.disabled = (this.value==='Level') || PANEL[idx].eyePos.disabled;
        if(this.value==='Level') PANEL[idx].eyeLvl.value=0;
        updateFieldStates();
      });
    })(i);
  }

  // ── SUDS — live popup on bad value ────────────────────────────
  [0,1].forEach(idx => {
    PANEL[idx].suds.addEventListener('change', function(){
      let v = parseInt(this.value);
      if(this.value && (isNaN(v)||v<1||v>10)){
        showPopup(['Feeling Level must be between 1 and 10']);
        this.value='';
      }
      updateFieldStates();
    });
  });

  // ── Hours — live popup on bad value ───────────────────────────
  hoursInput.addEventListener('change', function(){
    let v = parseFloat(this.value);
    if(this.value && (isNaN(v)||v<=0)){
      showPopup(['Hours Used must be a positive number greater than 0']);
      this.value='';
    }
    updateFieldStates();
  });
  hoursInput.addEventListener('input', function(){
    if(this.value.startsWith('-')) this.value='';
    let v = parseFloat(this.value);
    if(!isNaN(v) && v<=0 && this.value!=='') this.value='';
  });

  // ── Live redraw on spread/distance/eyelevel ───────────────────
  for(let i=0;i<4;i++){
    PANEL[i].spread.addEventListener('input', function(){ drawClock(); updateFieldStates(); });
    PANEL[i].dist.addEventListener('input', updateFieldStates);
    PANEL[i].eyeLvl.addEventListener('input', updateFieldStates);
  }

  // ── Top fields → state update ─────────────────────────────────
  ['therapistNumber','participantNumber','issueName','modality','sessionType','sessionDate'].forEach(id=>{
    $(id).addEventListener('input', updateFieldStates);
    $(id).addEventListener('change', updateFieldStates);
  });

  // ── Reset ─────────────────────────────────────────────────────
  $('resetBtn').addEventListener('click', function(){
    markers=[null,null,null,null];
    for(let i=0;i<4;i++) clearPanel(i);
    blBeforeChk.checked=false; blAfterChk.checked=false;
    blBeforeOn=false; blAfterOn=false;
    $('panel-before-bl').style.display='none';
    $('panel-after-bl').style.display='none';
    notesTA.value=''; updateWordCounter();
    drawClock(); updateFieldStates();
  });

  // ── Word counter ──────────────────────────────────────────────
  function countWords(s){ return s.trim() ? s.trim().split(/\s+/).length : 0; }
  function updateWordCounter(){
    let wc = countWords(notesTA.value);
    $('wordCounter').innerHTML = `${wc} / 500 words`;
    if(wc>500) notesTA.value = notesTA.value.trim().split(/\s+/).slice(0,500).join(' ');
  }
  notesTA.addEventListener('input', updateWordCounter);
  updateWordCounter();

  // ── CSV helper — always outputs all BL columns ────────────────
  // Returns the field value if BL active, otherwise 'n/a'
  function blVal(isActive, val){
    return isActive ? (val || '') : 'n/a';
  }

  // ── Download ──────────────────────────────────────────────────
  $('downloadBtn').addEventListener('click', async function(){
    // If somehow button is clicked while disabled, show errors
    if(downloadBtn.disabled){
      let errs = collectErrors();
      if(errs.length) showPopup(errs);
      return;
    }

    let prefix = `${$('therapistNumber').value}_${$('participantNumber').value}_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}`;

    // Screenshot
    let shot = await html2canvas(document.body, {scale:2});
    let lnk = document.createElement('a');
    lnk.download = prefix+'_form.png'; lnk.href = shot.toDataURL(); lnk.click();

    // CSV — fixed column structure regardless of BL state
    // Headers
    const hdr = [
      'admin','participant','emotion','modality','sessType','hours','date',
      'startSUDS','startPos','startDist','startSpread','startEyeL','startEyeP',
      'endSUDS','endPos','endDist','endSpread','endEyeL','endEyeP',
      'blBefore','blStartPos','blStartDist','blStartSpread','blStartEyeL','blStartEyeP',
      'blAfter','blEndPos','blEndDist','blEndSpread','blEndEyeL','blEndEyeP',
      'notes'
    ].join(';');

    let p = PANEL;
    const row = [
      // Top fields
      $('therapistNumber').value,
      $('participantNumber').value,
      $('issueName').value,
      $('modality').value,
      $('sessionType').value,
      hoursInput.value,
      $('sessionDate').value,
      // Before
      p[0].suds.value,
      p[0].clock.value,
      p[0].dist.value,
      p[0].spread.value,
      p[0].eyeLvl.value,
      p[0].eyePos.value,
      // After
      p[1].suds.value,
      p[1].clock.value,
      p[1].dist.value,
      p[1].spread.value,
      p[1].eyeLvl.value,
      p[1].eyePos.value,
      // Before-BL: flag then 5 fields (n/a if not active)
      blBeforeOn ? '1' : '0',
      blVal(blBeforeOn, p[2].clock.value),
      blVal(blBeforeOn, p[2].dist.value),
      blVal(blBeforeOn, p[2].spread.value),
      blVal(blBeforeOn, p[2].eyeLvl.value),
      blVal(blBeforeOn, p[2].eyePos.value),
      // After-BL: flag then 5 fields (n/a if not active)
      blAfterOn ? '1' : '0',
      blVal(blAfterOn, p[3].clock.value),
      blVal(blAfterOn, p[3].dist.value),
      blVal(blAfterOn, p[3].spread.value),
      blVal(blAfterOn, p[3].eyeLvl.value),
      blVal(blAfterOn, p[3].eyePos.value),
      // Notes
      notesTA.value.replace(/;/g,',')
    ].join(';');

    let blob = new Blob([hdr+'\n'+row], {type:'text/csv'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = prefix+'_data.csv'; a.click();
    URL.revokeObjectURL(a.href);
  });

  // ── Init ──────────────────────────────────────────────────────
  let d = new Date();
  $('sessionDate').value = `${d.getDate()} ${d.toLocaleString('default',{month:'short'})} ${d.getFullYear()}`.toUpperCase();
  drawClock();
  updateFieldStates();

})();
</script>
</body>
</html>
